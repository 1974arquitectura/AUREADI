<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>AUREA Desarrollos Inmobiliarios · Un proyecto, cuatro estilos, cinco etapas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

  :root {
    --gold: #D4AF37;
    --gold-luminous: #E0C87A;
    --gold-dark: #B8962C;
    --card-base-width: 140px;
    --card-hover-width: 280px;
    --card-height: 480px;
    --bg-color: #F9F6F0;
    --card-bg: #FFFFFF;
    --text-primary: #2C2A2A;
    --text-secondary: #6B6B6B;
    --text-label: #9B9B9B;
    --border-color: #EFECE5;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.04);
    --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.06);
    --shadow-xl: 0 12px 36px rgba(0, 0, 0, 0.1);
  }

  body { 
    font-family: 'Inter', sans-serif; 
    background: #0A0A0A; 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw; 
    position: fixed; 
    top: 0; 
    left: 0; 
  }

  .hero-bg {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: url('assets/images/hero/hero-bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 1;
    transition: filter 0.8s ease;
    filter: brightness(1) contrast(1.05);
  }
  .hero-bg.desenfocado { filter: brightness(0.55) blur(6px); }

  .global-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(3px);
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .global-overlay.visible { opacity: 1; }

  .banda-slice00 {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 29;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    pointer-events: auto;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .banda-slice00.hide { opacity: 0; visibility: hidden; pointer-events: none; }

  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.8rem;
    flex-wrap: wrap;
    animation: fadeInUp 0.8s ease;
  }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  .logo-img {
    width: 150px;
    height: 150px;
    object-fit: contain;
    filter: drop-shadow(0 4px 15px rgba(0,0,0,0.3));
    animation: pulseGold 2s infinite;
  }
  @keyframes pulseGold {
    0% { filter: drop-shadow(0 4px 15px rgba(0,0,0,0.3)) brightness(1); }
    50% { filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4)) brightness(1.08); }
    100% { filter: drop-shadow(0 4px 15px rgba(0,0,0,0.3)) brightness(1); }
  }

  .logo-text h1 {
    font-size: 5.7rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    background: linear-gradient(135deg, #F2E2B0 0%, #D4AF37 40%, #FFF8E7 60%, #D4AF37 80%, #B8902C 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4s linear infinite;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .slogan {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    color: var(--gold-luminous);
    font-weight: 400;
    text-transform: uppercase;
    margin-top: 0.5rem;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  @keyframes shimmer { 0% { background-position: 0% 0%; } 100% { background-position: 200% 0%; } }

  .slide-title-area {
    position: fixed;
    top: -100px;
    left: 0;
    width: 100%;
    text-align: center;
    z-index: 25;
    pointer-events: none;
    transition: top 0.4s ease, opacity 0.4s ease;
    opacity: 0;
    visibility: hidden;
  }
  .slide-title-area.visible { top: 1.5rem; opacity: 1; visibility: visible; }
  .current-slide-title {
    display: inline-block;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold-luminous);
    background: transparent;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3), 2px 2px 0 rgba(0,0,0,0.2);
  }

  .back-corner {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 200;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border-radius: 40px;
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: 0.3s;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .back-corner.visible { opacity: 1; visibility: visible; pointer-events: auto; }
  .back-corner:hover { background: rgba(0,0,0,0.7); transform: translateX(-3px); }
  .back-corner i { color: var(--gold-luminous); font-size: 0.9rem; }
  .back-corner span { color: #D1CCC3; font-size: 0.75rem; font-family: 'Inter', sans-serif; letter-spacing: 0.05em; }

  .corner-logo {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 200;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    border-radius: 40px;
    padding: 0.4rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: 0.3s;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .corner-logo.visible { opacity: 1; visibility: visible; pointer-events: auto; }
  .corner-logo:hover { background: rgba(0,0,0,0.7); transform: scale(1.02); }
  .corner-logo-img { width: 32px; height: 32px; object-fit: contain; }
  .corner-logo span { font-size: 0.75rem; color: var(--gold-luminous); font-weight: 400; font-family: 'Inter', sans-serif; letter-spacing: 0.1em; }

  /* ==================== CARRUSEL PRINCIPAL ==================== */
  @media (min-width: 769px) {
    .carousel-wrapper {
      position: fixed;
      bottom: 2rem;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 20;
      overflow-x: auto;
      overflow-y: visible;
      scroll-behavior: smooth;
      padding: 1rem 0;
      cursor: grab;
      transform: translateX(100%);
      transition: transform 0s ease;
    }
    .carousel-wrapper:active { cursor: grabbing; }
    .carousel-wrapper.visible { transform: translateX(0); transition: transform 2.5s ease; }
    .carousel-wrapper::-webkit-scrollbar { height: 4px; }
    .carousel-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); border-radius: 10px; }
    .carousel-wrapper::-webkit-scrollbar-thumb { background: var(--gold-luminous); border-radius: 10px; }
    
    .carousel-track {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      padding: 0 calc(50vw - 70px);
    }
    
    .carousel-card {
      flex-shrink: 0;
      width: var(--card-base-width);
      height: var(--card-height);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      filter: brightness(0.8) saturate(0.95);
      opacity: 0.9;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      position: relative;
      transform: scale(0.96);
      transition: all 0.4s cubic-bezier(0.2, 0.95, 0.4, 1.05);
      border: 1px solid transparent;
    }
    .carousel-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 100%);
      z-index: 1;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .carousel-card:hover {
      width: var(--card-hover-width);
      filter: brightness(1) saturate(1.05);
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
      z-index: 20;
    }
    .carousel-card:hover::before { opacity: 0; }
    .carousel-card:has(~ .carousel-card:hover), .carousel-card:hover ~ .carousel-card {
      filter: brightness(0.55) saturate(0.7);
      opacity: 0.65;
      transform: scale(0.93);
    }
    .carousel-card.selected {
      width: var(--card-hover-width);
      filter: brightness(1) saturate(1);
      opacity: 1;
      transform: scale(1);
      z-index: 20;
      border: 3px solid var(--gold);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(212, 175, 55, 0.3), 0 0 20px rgba(212, 175, 55, 0.25);
    }
    .carousel-card.selected::before { opacity: 0; }
    .carousel-card img { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 0; }
    .carousel-card::after {
      content: '🔍';
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-size: 1.2rem;
      opacity: 0;
      z-index: 2;
      transition: opacity 0.3s ease;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      pointer-events: none;
    }
    .carousel-card:hover::after { opacity: 0.8; }
    .contact-button-mobile { display: none; }
    .instruction { bottom: 1.5rem; font-size: 0.7rem; }
  }

  /* ==================== RESPONSIVE MÓVIL ==================== */
  @media (max-width: 768px) {
    .logo-img { width: 100px; height: 100px; }
    .logo-text h1 { font-size: 3rem; }
    .slogan { font-size: 0.6rem; letter-spacing: 0.2em; }
    .corner-logo-img { width: 28px; height: 28px; }
    .slide-title-area.visible { top: 3rem; }
    .current-slide-title { font-size: 1rem; letter-spacing: 0.1em; }

    .carousel-wrapper {
      position: fixed;
      top: 6rem;
      bottom: auto;
      left: 0;
      width: 100%;
      height: calc(100vh - 7.5rem);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
      cursor: default;
      z-index: 20;
      transform: translateX(-100%);
      transition: transform 0s ease;
    }
    .carousel-wrapper.visible { transform: translateX(0); transition: transform 2.5s ease; }
    .carousel-track {
      display: flex;
      flex-direction: row !important;
      flex-wrap: wrap;
      gap: 16px;
      padding: 16px;
      justify-content: center;
    }
    .carousel-card {
      width: calc(50% - 16px) !important;
      min-width: 150px;
      height: auto !important;
      min-height: 280px;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      filter: brightness(0.85);
      opacity: 0.95;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      position: relative;
      border: 1px solid transparent;
    }
    .carousel-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 100%);
      z-index: 1;
      pointer-events: none;
    }
    .carousel-card.selected {
      border: 3px solid var(--gold);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(212, 175, 55, 0.3);
      filter: brightness(1);
      transform: scale(1.01);
    }
    .carousel-card.selected::before { background: rgba(0, 0, 0, 0); }
    .carousel-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      position: relative;
      z-index: 0;
    }
    .card-mobile-info {
      padding: 0.6rem;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      text-align: center;
      border-radius: 0 0 20px 20px;
    }
    .card-mobile-info h3 { 
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--gold-luminous);
      font-weight: 500;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .card-mobile-info p { font-size: 0.6rem; color: rgba(255,255,255,0.7); font-family: 'Inter', sans-serif; }
    
    .contact-button-mobile {
      position: fixed;
      bottom: 2rem;
      right: 1rem;
      width: 56px;
      height: 56px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .contact-button-mobile.visible { opacity: 1; visibility: visible; pointer-events: auto; }
    .contact-button-mobile i { font-size: 1.5rem; color: #1a1a1a; }
    .instruction { bottom: 0.8rem; font-size: 0.6rem; }

    /* PROYECTO MÓVIL */
    .detail-content { padding: 1rem; padding-top: 4rem; }
    .detail-header h2 { font-size: 2rem; }
    .proyecto-texto-fullwidth { padding: 1.5rem; }
    .proyecto-texto-fullwidth h2 { font-size: 2rem; }
    .proyecto-texto-fullwidth .descripcion { font-size: 1rem; }
    .cita-fullwidth { font-size: 1rem; }
    .estilos-grid-four { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .estilo-card-info h4 { font-size: 1rem; }
    .estilo-card-info p { font-size: 0.6rem; }
    .estilos-section-title { font-size: 1.4rem; }
    
    /* PROGRAMA MÓVIL */
    .programa-timeline { margin: 1rem 0 2rem; }
    .timeline-icon { width: 36px; height: 36px; font-size: 0.9rem; }
    .timeline-line { top: 18px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .programa-header h2 { font-size: 1.8rem; }
    
    /* PROGRAMA - CONTENEDOR FLEXIBLE */
    .programa-horizontal-card {
      width: calc(80vw - 20px);
      max-width: 280px;
      min-width: 240px;
      height: auto;
    }
    .programa-horizontal-card:hover {
      width: calc(80vw - 20px);
      transform: scale(1.02);
    }
    .programa-horizontal-card img {
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    
    /* ESTILOS MÓVIL */
    .estilos-grid { grid-template-columns: 1fr; }
    .style-intro-wrapper { flex-direction: column; }
    .style-intro-text { font-size: 1.1rem; padding-left: 1rem; }
    .materials-grid { grid-template-columns: repeat(2, 1fr); }
    .material-card img { height: 80px; }
    
    /* EXTERIORES/INTERIORES - CONTENEDOR FLEXIBLE */
    .exterior-interior-card {
      width: calc(85vw - 20px);
      max-width: 320px;
      min-width: 260px;
      height: auto;
    }
    .exterior-interior-card img {
      height: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
    }
    .exterior-interior-card .exterior-interior-caption {
      padding: 0.8rem;
    }
    .exterior-interior-card .exterior-interior-caption h4 {
      font-size: 0.85rem;
      white-space: normal;
      word-break: break-word;
    }
    .exterior-interior-card .exterior-interior-caption p {
      font-size: 0.7rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    /* TÉCNICA MÓVIL */
    .tecnica-layout { flex-direction: column; }
    .tecnica-scroll-container { height: auto; max-height: 50vh; }
    .tecnica-estilo-card { width: 120px; height: 280px; }
    .tecnica-estilo-card:hover { width: 120px; transform: scale(1.02); }
    .tecnica-estilo-card.active { width: 120px; }
    
    /* AJUSTE DE BORDES */
    .estilo-card-large:hover,
    .programa-horizontal-card:hover,
    .estilos-grid-card:hover,
    .exterior-interior-card:hover,
    .info-card:hover,
    .material-card:hover,
    .summary-card:hover {
      border-width: 2px;
    }
  }

  /* ==================== VISOR FULLSCREEN ==================== */
  .fullscreen-image-view {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg-color);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .fullscreen-image-view img {
    height: 85vh;
    width: auto;
    max-width: 90vw;
    object-fit: contain;
    object-position: center;
    pointer-events: none;
  }
  .fullscreen-image-view .image-caption {
    position: absolute;
    bottom: 2rem;
    left: 2rem;
    right: 2rem;
    max-width: 500px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    pointer-events: none;
    z-index: 10;
    text-shadow: none;
    background: rgba(249, 246, 240, 0.9);
    backdrop-filter: blur(8px);
    padding: 1rem;
    border-radius: 12px;
  }
  .fullscreen-image-view .image-caption h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-primary); }
  .fullscreen-image-view .image-caption p { font-size: 1rem; line-height: 1.5; color: var(--text-secondary); }
  .fullscreen-nav {
    position: absolute;
    bottom: 2rem;
    right: 2rem;
    display: flex;
    gap: 1rem;
    z-index: 10;
  }
  .fullscreen-nav button {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid var(--gold);
    padding: 0.5rem 1rem;
    border-radius: 40px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: 0.3s;
  }
  .fullscreen-nav button:hover { background: var(--gold); color: #1a1a1a; }
  .fullscreen-nav button:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ==================== PANTALLA DE DETALLE ==================== */
  .detail-screen {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    height: 100vh;
    background: var(--bg-color);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.5s ease;
    overflow-y: auto;
  }
  .detail-screen.active { transform: translateX(0); }
  .detail-content { padding: 2rem; max-width: 1400px; margin: 0 auto; padding-top: 5rem; padding-bottom: 4rem; }
  .detail-header { margin-bottom: 2rem; }
  .detail-header h2 { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 800; color: var(--text-primary); border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 0.3rem; margin-bottom: 1rem; }
  .detail-subheader { font-family: 'Inter', sans-serif; font-size: 1rem; color: var(--text-secondary); max-width: 700px; line-height: 1.5; }

  /* ==================== PROYECTO ==================== */
  .proyecto-texto-fullwidth {
    background: var(--card-bg);
    padding: 2.5rem;
    border-radius: 24px;
    margin-bottom: 3rem;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
  }
  .proyecto-texto-fullwidth h2 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    border-bottom: 2px solid var(--gold);
    display: inline-block;
    padding-bottom: 0.3rem;
  }
  .proyecto-texto-fullwidth .subtitulo {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    color: var(--gold-dark);
    text-transform: uppercase;
    margin: 1rem 0 1.5rem 0;
    font-weight: 500;
  }
  .proyecto-texto-fullwidth .descripcion {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    line-height: 1.65;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }
  .proyecto-texto-fullwidth .descripcion strong { font-weight: 700; color: var(--text-primary); }
  .cita-fullwidth {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-style: italic;
    color: var(--gold-dark);
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
    text-align: center;
  }

  .proyecto-estilos-fullwidth { margin-top: 1rem; }
  .estilos-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    text-align: center;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }
  .estilos-section-subtitle {
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    color: var(--text-label);
    margin-bottom: 2rem;
  }
  .estilos-grid-four {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
  }
  .estilo-card-large {
    background: var(--card-bg);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;

<div class="hero-bg" id="heroBg"></div>
<div class="global-overlay" id="globalOverlay"></div>
<div class="back-corner" id="backCorner"><i class="fas fa-arrow-left"></i><span>Volver</span></div>

<div class="banda-slice00" id="welcomeScreen"><div class="logo-area"><img src="assets/logo-aurea.png" alt="AUREA Logo" class="logo-img" onerror="this.src='assets/logo-aurea.png'"><div class="logo-text"><h1>AUREA</h1><div class="slogan">DESARROLLOS INMOBILIARIOS</div></div></div></div>

<script>
(function() {
  const isMobile = window.innerWidth <= 768;
  
  const secciones = [
    { id: "proyecto", nombre: "PROYECTO", titulo: "El Proyecto", thumb: "assets/images/carrusel/proyecto.jpg" },
    { id: "programa", nombre: "PROGRAMA", titulo: "El Programa", thumb: "assets/images/carrusel/programa.jpg" },
    { id: "estilos", nombre: "ESTILOS", titulo: "Estilos", thumb: "assets/images/carrusel/estilos.jpg" },
    { id: "tecnica", nombre: "TÉCNICA", titulo: "Documentación Técnica", thumb: "assets/images/carrusel/tecnica.jpg" },
    { id: "contacto", nombre: "CONTACTO", titulo: "Contacto", thumb: "assets/images/carrusel/contacto.jpg" }
  ];

  const elements = {
    welcome: document.getElementById('welcomeScreen'), heroBg: document.getElementById('heroBg'),
    globalOverlay: document.getElementById('globalOverlay'),
    carouselWrapper: document.getElementById('mainCarousel'), carouselTrack: document.getElementById('carouselTrack'),
    detailScreen: document.getElementById('detailScreen'), detailContent: document.getElementById('detailContent'),
    slideTitle: document.getElementById('slideTitleArea'),
    currentTitle: document.getElementById('currentTitle'), instruction: document.getElementById('instructionMsg'),
    cornerLogo: document.getElementById('cornerLogo'), contactMobile: document.getElementById('contactButtonMobile'),
    backCorner: document.getElementById('backCorner')
  };

  let isExperienceActive = false, isTransitioning = false;
  let currentSelectedId = null;
  let activeHoverCard = null;
  let navigationStack = [];
  let currentFullscreenDiv = null;
  let currentGalleryImages = [];
  let currentGalleryIndex = 0;

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

  function closeFullscreen() {
    if (currentFullscreenDiv) { 
      if (currentFullscreenDiv.cleanup) currentFullscreenDiv.cleanup();
      currentFullscreenDiv.remove(); 
      currentFullscreenDiv = null; 
      document.body.style.overflow = ''; 
    }
  }

  function showFullscreenImage(imagesArray, startIndex, title, description) {
    currentGalleryImages = imagesArray;
    currentGalleryIndex = startIndex;
    
    function updateFullscreenContent() {
      const item = currentGalleryImages[currentGalleryIndex];
      if (!item) return;
      const imgElement = currentFullscreenDiv.querySelector('.fullscreen-img');
      const titleElement = currentFullscreenDiv.querySelector('.fullscreen-title');
      const descElement = currentFullscreenDiv.querySelector('.fullscreen-desc');
      const prevBtn = currentFullscreenDiv.querySelector('.fullscreen-prev');
      const nextBtn = currentFullscreenDiv.querySelector('.fullscreen-next');
      if (imgElement) imgElement.src = item.img;
      if (titleElement) titleElement.textContent = item.title || '';
      if (descElement) descElement.textContent = item.desc || '';
      if (prevBtn) { 
        prevBtn.disabled = (currentGalleryIndex === 0); 
        prevBtn.style.opacity = (currentGalleryIndex === 0) ? '0.3' : '1'; 
      }
      if (nextBtn) { 
        nextBtn.disabled = (currentGalleryIndex === currentGalleryImages.length - 1); 
        nextBtn.style.opacity = (currentGalleryIndex === currentGalleryImages.length - 1) ? '0.3' : '1'; 
      }
    }
    
    function goPrev() { if (currentGalleryIndex > 0) { currentGalleryIndex--; updateFullscreenContent(); } }
    function goNext() { if (currentGalleryIndex < currentGalleryImages.length - 1) { currentGalleryIndex++; updateFullscreenContent(); } }
    
    if (currentFullscreenDiv) closeFullscreen();
    
    const item = imagesArray[startIndex];
    currentFullscreenDiv = document.createElement('div');
    currentFullscreenDiv.className = 'fullscreen-image-view';
    currentFullscreenDiv.innerHTML = `
      <img class="fullscreen-img" src="${item.img}" onerror="this.src='https://placehold.co/1200x1600?text=Imagen'">
      <div class="image-caption">
        <h2 class="fullscreen-title">${escapeHtml(title)}</h2>
        <p class="fullscreen-desc">${escapeHtml(description)}</p>
      </div>
      <div class="fullscreen-nav">
        <button class="fullscreen-prev" ${startIndex === 0 ? 'disabled' : ''}>◀ Anterior</button>
        <button class="fullscreen-next" ${startIndex === imagesArray.length - 1 ? 'disabled' : ''}>Siguiente ▶</button>
      </div>
    `;
    document.body.appendChild(currentFullscreenDiv);
    document.body.style.overflow = 'hidden';
    
    const prevBtn = currentFullscreenDiv.querySelector('.fullscreen-prev');
    const nextBtn = currentFullscreenDiv.querySelector('.fullscreen-next');
    if (prevBtn) prevBtn.addEventListener('click', goPrev);
    if (nextBtn) nextBtn.addEventListener('click', goNext);
    
    function handleWheel(e) { if (e.deltaY > 0) goNext(); else if (e.deltaY < 0) goPrev(); }
    let touchStartX = 0;
    function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
    function handleTouchEnd(e) {
      const touchEndX = e.changedTouches[0].screenX;
      const swipeThreshold = 50;
      if (touchEndX < touchStartX - swipeThreshold) goNext();
      else if (touchEndX > touchStartX + swipeThreshold) goPrev();
    }
    function handleKeyDown(e) {
      if (e.key === 'ArrowLeft') goPrev();
      else if (e.key === 'ArrowRight') goNext();
      else if (e.key === 'Escape') closeFullscreen();
    }
    
    currentFullscreenDiv.addEventListener('wheel', handleWheel);
    currentFullscreenDiv.addEventListener('touchstart', handleTouchStart);
    currentFullscreenDiv.addEventListener('touchend', handleTouchEnd);
    document.addEventListener('keydown', handleKeyDown);
    currentFullscreenDiv.addEventListener('click', (e) => { if (e.target === currentFullscreenDiv) closeFullscreen(); });
    
    currentFullscreenDiv.cleanup = () => {
      currentFullscreenDiv.removeEventListener('wheel', handleWheel);
      currentFullscreenDiv.removeEventListener('touchstart', handleTouchStart);
      currentFullscreenDiv.removeEventListener('touchend', handleTouchEnd);
      document.removeEventListener('keydown', handleKeyDown);
    };
  }

  function showSection(type, styleId, section) {
    if (type === 'estilos') openEstilosDetail();

    else if (type === 'tecnica') openTecnicaDetail();

    else if (type === 'style' && styleId) openStyleDetail(styleId, section || 'intro');

  function openStyleDetail(styleId, section = 'intro') {

        <button class="${section === 'interiores' ? 'active' : ''}" data-section="interiores">INTERIORES</button>

    let content = '';

    elements.backCorner.classList.add('visible');

      btn.addEventListener('click', () => {
        const newSection = btn.getAttribute('data-section').toLowerCase();
        navigationStack.push({ type: 'style', styleId: styleId, section: newSection });
        openStyleDetail(styleId, newSection);
      });

    const imagesArray = (section === 'exteriores' ? style.exteriores : (section === 'interiores' ? style.interiores : []));

      if (carousel) carousel.addEventListener('wheel', (e) => { e.preventDefault(); carousel.scrollLeft += e.deltaY; }, { passive: false });
    }, 100);
  }

        showFullscreenImage([{ img, title: nombre, desc }], 0, nombre, desc);
      });
    });
    
    elements.backCorner.classList.add('visible');
  }

  function openEstilosDetail() {
    elements.detailContent.innerHTML = `
      <div class="detail-header">
        <h2>Estilos Arquitectónicos</h2>
        <p class="detail-subheader">Cuatro personalidades para una misma esencia. Cada estilo mantiene la promesa de crecimiento armónico.</p>
      </div>
      <div class="estilos-grid" id="estilosGrid">
        <div class="estilos-grid-card" data-style="neoclasico"><img src="assets/images/proyecto/4-estilos/neoclasico.jpg" onerror="this.src='https://placehold.co/600x800?text=Neocl%C3%A1sico'"><div class="estilos-card-content"><h3>Neoclásico</h3><p class="tagline">La proporción clásica</p><p class="materials">Bronce · Caliza · Estuco</p><button class="explore-btn">Explorar <i class="fas fa-arrow-right"></i></button></div></div>
        <div class="estilos-grid-card" data-style="mediterraneo"><img src="assets/images/proyecto/4-estilos/mediterraneo.jpg" onerror="this.src='https://placehold.co/600x800?text=Mediterr%C3%A1neo'"><div class="estilos-card-content"><h3>Mediterráneo</h3><p class="tagline">Calidez que envuelve</p><p class="materials">Cerámica · Madera · Terracota</p><button class="explore-btn">Explorar <i class="fas fa-arrow-right"></i></button></div></div>
        <div class="estilos-grid-card" data-style="minimalista"><img src="assets/images/proyecto/4-estilos/minimalista.jpg" onerror="this.src='https://placehold.co/600x800?text=Minimalista'"><div class="estilos-card-content"><h3>Minimalista</h3><p class="tagline">Líneas puras</p><p class="materials">Barro · Lino · Piedra</p><button class="explore-btn">Explorar <i class="fas fa-arrow-right"></i></button></div></div>
        <div class="estilos-grid-card" data-style="internacional"><img src="assets/images/proyecto/4-estilos/internacional.jpg" onerror="this.src='https://placehold.co/600x800?text=Internacional'"><div class="estilos-card-content"><h3>Internacional</h3><p class="tagline">Vanguardia funcional</p><p class="materials">Acero · Hormigón · Vidrio</p><button class="explore-btn">Explorar <i class="fas fa-arrow-right"></i></button></div></div>
      </div>
      <div class="comparison-section">
        <h3 class="section-title">Comparativa de Estilos</h3>
        <div class="comparison-grid">
          <div class="comparison-item"><span class="comp-label">Materialidad</span><span class="comp-value">Natural vs Industrial</span></div>
          <div class="comparison-item"><span class="comp-label">Paleta cromática</span><span class="comp-value">Neutros cálidos / Fríos</span></div>
          <div class="comparison-item"><span class="comp-label">Texturas</span><span class="comp-value">Rústicas / Pulidas</span></div>
          <div class="comparison-item"><span class="comp-label">Luz</span><span class="comp-value">Tamizada / Abierta</span></div>
        </div>
      </div>
    `;
    
    document.querySelectorAll('.estilos-grid-card').forEach(el => {
      el.addEventListener('click', () => {
        const styleId = el.getAttribute('data-style');
        navigateToStyleFromProject(styleId);
      });
    });
    
    elements.backCorner.classList.add('visible');
  }

  function openTecnicaDetail() {
    let currentStyle = 'neoclasico';
    let isAnimating = false;
    
    function getStyleImages(style) {
      return {
        isometrico: `assets/images/tecnica/isometrico-${style}.png`,
        planta: `assets/images/tecnica/planta-${style}.png`
      };
    }
    
    function getStyleDisplayName(styleId) {
      const names = { 'neoclasico': 'Neoclásica', 'mediterraneo': 'Mediterránea', 'minimalista': 'Minimalista', 'internacional': 'Internacional' };
      return names[styleId] || styleId;
    }
    
    function renderTecnica() {
      const images = getStyleImages(currentStyle);
      const styleDisplayName = getStyleDisplayName(currentStyle);
      elements.detailContent.innerHTML = `
        <div class="detail-header"><h2>Documentación Técnica</h2><p class="detail-subheader">Un mismo programa, cuatro almas diferentes. La casa crece en cinco etapas armónicas.</p></div>
        <div class="tecnica-layout">
          <div class="tecnica-izquierda">
            <div class="tecnica-estilos-carousel" id="tecnicaEstilosCarousel">
              <div class="tecnica-estilos-track">
                <div class="tecnica-estilo-card ${currentStyle === 'neoclasico' ? 'active' : ''}" data-style="neoclasico"><img src="assets/images/proyecto/4-estilos/neoclasico.jpg" onerror="this.src='https://placehold.co/400x600?text=Neoclásico'"><div class="tecnica-estilo-caption"><h4>Neoclásico</h4></div></div>
                <div class="tecnica-estilo-card ${currentStyle === 'mediterraneo' ? 'active' : ''}" data-style="mediterraneo"><img src="assets/images/proyecto/4-estilos/mediterraneo.jpg" onerror="this.src='https://placehold.co/400x600?text=Mediterráneo'"><div class="tecnica-estilo-caption"><h4>Mediterráneo</h4></div></div>
                <div class="tecnica-estilo-card ${currentStyle === 'minimalista' ? 'active' : ''}" data-style="minimalista"><img src="assets/images/proyecto/4-estilos/minimalista.jpg" onerror="this.src='https://placehold.co/400x600?text=Minimalista'"><div class="tecnica-estilo-caption"><h4>Minimalista</h4></div></div>
                <div class="tecnica-estilo-card ${currentStyle === 'internacional' ? 'active' : ''}" data-style="internacional"><img src="assets/images/proyecto/4-estilos/internacional.jpg" onerror="this.src='https://placehold.co/400x600?text=Internacional'"><div class="tecnica-estilo-caption"><h4>Internacional</h4></div></div>
              </div>
            </div>
          </div>
          <div class="tecnica-derecha">
            <div class="tecnica-scroll-container">
              <div class="tecnica-scroll-content">
                <div class="tecnica-imagen"><h4>Vista Isométrica ${styleDisplayName}</h4><img id="isometricoImg" src="${images.isometrico}" onerror="this.src='https://placehold.co/800x600?text=Vista+Isometrica'"></div>
                <div class="tecnica-imagen"><h4>Planta Amueblada</h4><img id="plantaImg" src="${images.planta}" onerror="this.src='https://placehold.co/800x600?text=Planta'"></div>
              </div>
            </div>
          </div>
        </div>
      `;
      
      const tecCarousel = document.getElementById('tecnicaEstilosCarousel');
      if (tecCarousel) tecCarousel.addEventListener('wheel', (e) => { e.preventDefault(); tecCarousel.scrollLeft += e.deltaY; }, { passive: false });
      
      document.querySelectorAll('.tecnica-estilo-card').forEach(card => {
        card.addEventListener('click', () => {
          if (isAnimating) return;
          const newStyle = card.getAttribute('data-style');
          if (newStyle === currentStyle) return;
          isAnimating = true;
          document.querySelectorAll('.tecnica-estilo-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          const newImages = getStyleImages(newStyle);
          const newStyleDisplayName = getStyleDisplayName(newStyle);
          const isometricoImg = document.getElementById('isometricoImg');
          const isometricoTitle = document.querySelector('.tecnica-imagen:first-child h4');
          if (isometricoImg) isometricoImg.src = newImages.isometrico;
          if (isometricoTitle) isometricoTitle.textContent = `Vista Isométrica ${newStyleDisplayName}`;
          currentStyle = newStyle;
          setTimeout(() => { isAnimating = false; }, 300);
        });
      });
    }
    renderTecnica();
    elements.backCorner.classList.add('visible');
  }

  function openContactoDetail() {
    elements.detailContent.innerHTML = `
      <div class="detail-header"><h2>Contacto</h2><p class="detail-subheader">¿Soñamos juntos? Contanos cuál de los cuatro estilos resuena con tu forma de vivir.</p></div>
      <div class="info-grid">
        <div class="info-card"><img src="assets/images/contacto/oficina.jpg" onerror="this.src='https://placehold.co/800x600?text=Email'"><div class="info-card-content"><h4>Email</h4><p>info@aureadesarrollosinmobiliarios.com</p></div></div>
        <div class="info-card"><img src="assets/images/contacto/equipo.jpg" onerror="this.src='https://placehold.co/800x600?text=Teléfono'"><div class="info-card-content"><h4>Teléfono</h4><p>02954 829221</p></div></div>
      </div>
      <div class="contact-footer-text">Construimos más que casas. Construimos un lugar al que quieras volver siempre.</div>
    `;
    elements.backCorner.classList.add('visible');
  }

  function openDetail(id) {
    if (!isExperienceActive) return;
    elements.slideTitle.classList.add('hide-title');
    elements.carouselWrapper.classList.add('hiding');
    elements.instruction.classList.add('hide');
    setTimeout(() => {
      if (id === 'proyecto') { navigationStack.push({ type: 'proyecto' }); openProyectoDetail(); }
      else if (id === 'programa') { navigationStack.push({ type: 'programa' }); openProgramaDetail(); }
      else if (id === 'estilos') { navigationStack.push({ type: 'estilos' }); openEstilosDetail(); }
      else if (id === 'tecnica') { navigationStack.push({ type: 'tecnica' }); openTecnicaDetail(); }
      else if (id === 'contacto') { navigationStack.push({ type: 'contacto' }); openContactoDetail(); }
      elements.detailScreen.classList.add('active');
    }, 500);
  }

  function goBack() {
    if (currentFullscreenDiv) { closeFullscreen(); return; }
    if (navigationStack.length > 0) {
      navigationStack.pop();
      if (navigationStack.length === 0) closeDetail();
      else { const last = navigationStack[navigationStack.length - 1]; showSection(last.type, last.styleId, last.section); }
    } else { closeDetail(); }
  }

  function closeDetail() {
    elements.detailScreen.classList.remove('active');
    elements.carouselWrapper.classList.remove('hiding');
    elements.slideTitle.classList.remove('hide-title');
    elements.instruction.classList.remove('hide');
    elements.backCorner.classList.remove('visible');
  }

  function rebuildCarousel() {
    if (!elements.carouselTrack) return;
    elements.carouselTrack.innerHTML = '';
    secciones.forEach((sec) => {
      const card = document.createElement('div');
      card.className = 'carousel-card';
      card.setAttribute('data-id', sec.id);
      card.setAttribute('data-title', sec.titulo);
      const img = document.createElement('img');
      img.src = sec.thumb;
      img.alt = sec.nombre;
      img.loading = 'lazy';
      img.onerror = () => { img.src = 'https://placehold.co/400x500?text=' + sec.nombre; };
      card.appendChild(img);
      if (isMobile) {
        const infoDiv = document.createElement('div');
        infoDiv.className = 'card-mobile-info';
        infoDiv.innerHTML = `<h3>${escapeHtml(sec.nombre)}</h3><p>${escapeHtml(sec.titulo)}</p>`;
        card.appendChild(infoDiv);
      }
      if (!isMobile) {
        card.addEventListener('mouseenter', () => {
          if (isExperienceActive && elements.currentTitle && !elements.detailScreen.classList.contains('active')) {
            elements.currentTitle.innerText = card.getAttribute('data-title');
          }
        });
        card.addEventListener('mouseleave', () => {
          if (isExperienceActive && elements.currentTitle && !elements.detailScreen.classList.contains('active')) {
            elements.currentTitle.innerText = '';
          }
        });
      }
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!isExperienceActive) return;
        document.querySelectorAll('.carousel-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        if (elements.currentTitle) elements.currentTitle.innerText = card.getAttribute('data-title');
        openDetail(card.dataset.id);
      });
      elements.carouselTrack.appendChild(card);
    });
  }

  function startExperience() {
    if (isTransitioning || isExperienceActive) return;
    isTransitioning = true;
    elements.welcome.classList.add('hide');
    elements.heroBg.classList.add('desenfocado');
    elements.globalOverlay.classList.add('visible');
    setTimeout(() => {
      elements.carouselWrapper.classList.add('visible');
      if (isMobile && elements.contactMobile) elements.contactMobile.classList.add('visible');
      elements.cornerLogo.classList.add('visible');
    }, 500);
    setTimeout(() => elements.slideTitle.classList.add('visible'), 900);
    elements.instruction.classList.add('hide');
    setTimeout(() => { isExperienceActive = true; isTransitioning = false; }, 1600);
  }

  function resetToWelcome() {
    if (isTransitioning) return;
    isTransitioning = true;
    if (currentFullscreenDiv) closeFullscreen();
    if (elements.detailScreen.classList.contains('active')) elements.detailScreen.classList.remove('active');
    if (elements.carouselWrapper) { if (!isMobile) elements.carouselWrapper.scrollLeft = 0; else elements.carouselWrapper.scrollTop = 0; }
    isExperienceActive = false;
    navigationStack = [];
    elements.welcome.classList.remove('hide');
    elements.heroBg.classList.remove('desenfocado');
    elements.globalOverlay.classList.remove('visible');
    elements.carouselWrapper.classList.remove('visible');
    elements.slideTitle.classList.remove('visible');
    elements.instruction.classList.remove('hide');
    if (elements.contactMobile) elements.contactMobile.classList.remove('visible');
    elements.cornerLogo.classList.remove('visible');
    elements.backCorner.classList.remove('visible');
    if (elements.currentTitle) elements.currentTitle.innerText = '';
    setTimeout(() => { isTransitioning = false; }, 100);
  }

  function init() {
    if (elements.heroBg) elements.heroBg.classList.remove('desenfocado');
    rebuildCarousel();
    if (elements.welcome) elements.welcome.addEventListener('click', startExperience);
    if (elements.cornerLogo) elements.cornerLogo.addEventListener('click', (e) => { e.stopPropagation(); resetToWelcome(); });
    if (elements.backCorner) elements.backCorner.addEventListener('click', () => goBack());
    if (elements.contactMobile) elements.contactMobile.addEventListener('click', () => { if (isExperienceActive) openDetail('contacto'); });
    if (elements.carouselWrapper && !isMobile) elements.carouselWrapper.addEventListener('wheel', (e) => { if (isExperienceActive) { e.preventDefault(); elements.carouselWrapper.scrollLeft += e.deltaY; } }, { passive: false });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
